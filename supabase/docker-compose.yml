version: "3.8"
services:
  # 1. STUDIO (DASHBOARD ADMIN)
  studio:
    container_name: supabase-studio
    image: supabase/studio:20240101-8e4a094
    restart: unless-stopped
    # ports:
    #   - "3000:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: root_cbt_vhd_secure_2026
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      # TAMBAHAN 2026: Mengaktifkan Penyimpanan Permanen Snippet SQL
      SNIPPETS_MANAGEMENT_FOLDER: /var/lib/snippets
    volumes:
      # Menyimpan file fisik snippet ke dalam folder VHD
      - ./volumes/studio/snippets:/var/lib/snippets
    networks:
      - supabase_network

  # --- SECURITY SHIELD UNTUK STUDIO (ZERO-TRUST AUTH) ---
  studio-auth:
    container_name: supabase-studio-auth
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - USER=${DASHBOARD_USERNAME:-admin@cbtschool.com}
      - PASS=${DASHBOARD_PASSWORD:-4121Wijaya*@?}
    command: /bin/sh -c "apk add --no-cache apache2-utils && htpasswd -b -c /etc/nginx/.htpasswd $$USER $$PASS && echo 'server { listen 80; location / { auth_basic \"Area Terbatas CBT Enterprise\"; auth_basic_user_file /etc/nginx/.htpasswd; proxy_pass http://studio:3000; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - studio
    networks:
      - supabase_network

  # 2. KONG (API GATEWAY)
  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "${PORT}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - supabase_network

  # 3. AUTH (GOTRUE)
  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.132.3
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:root_cbt_vhd_secure_2026@db:5432/postgres
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_SITE_URL: ${API_EXTERNAL_URL}
    networks:
      - supabase_network

  # 4. REST (POSTGREST)
  rest:
    container_name: supabase-rest
    # UPDATE 2026: Versi PostgREST terbaru untuk Cache JWT & Loading Kilat
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:root_cbt_vhd_secure_2026@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCK: "false"
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS}
    networks:
      - supabase_network

  # 5. REALTIME
  realtime:
    container_name: supabase-realtime
    image: supabase/realtime:v2.25.50
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: root_cbt_vhd_secure_2026
      DB_NAME: postgres
      JWT_SECRET: ${JWT_SECRET}
      REPLICATION_MODE: RLS
    networks:
      - supabase_network

  # 6. STORAGE
  storage:
    container_name: supabase-storage
    image: supabase/storage-api:v0.43.11
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:root_cbt_vhd_secure_2026@db:5432/postgres
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      GLOBAL_S3_BUCKET: stub
      REGION: local
      TENANT_ID: stub
      IS_MULTITENANT: "false"
    volumes:
      - ./volumes/storage:/var/lib/storage
    networks:
      - supabase_network

  # 7. META
  meta:
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.75.0
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PASSWORD: root_cbt_vhd_secure_2026
    networks:
      - supabase_network

  # 8. DATABASE (CORE)
  db:
    container_name: supabase-db
    image: supabase/postgres:15.1.0.147
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: root_cbt_vhd_secure_2026
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - supabase_network

networks:
  supabase_network:
    driver: bridge