# ==============================================================================
#  NGINX CONFIG — CBT SCHOOL ENTERPRISE VHD EDITION
#  Dioptimasi untuk 5000+ siswa concurrent
#  Versi: 2026.4 Production — Rate Limiting + Security Hardened
# ==============================================================================

# Worker processes = jumlah CPU core (auto detect)
worker_processes auto;

# Max file descriptors per worker (untuk 5000 koneksi concurrent)
worker_rlimit_nofile 65535;

events {
    # Max concurrent connections per worker
    # 5000 siswa × 3 koneksi (HTTP + WebSocket + API) = ~15000
    # Dengan auto worker_processes (4 core) = 4 × 4096 = 16384 total
    worker_connections 4096;

    # Terima beberapa koneksi sekaligus (lebih efisien)
    multi_accept on;

    # epoll = mekanisme paling efisien di Linux
    use epoll;
}

http {
    # --- MIME TYPES ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- PERFORMANCE ---
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;

    # Keepalive: browser tidak perlu reconnect setiap request
    keepalive_timeout  65;
    keepalive_requests 1000;

    # --- BUFFER SIZES ---
    client_body_buffer_size    128k;
    client_max_body_size       50M;   # Untuk upload foto soal/siswa
    client_header_buffer_size  1k;
    large_client_header_buffers 4 16k;

    # --- GZIP COMPRESSION (hemat bandwidth LAN ~70%) ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # --- TIMEOUTS ---
    proxy_connect_timeout  30s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # ==============================================================
    # RATE LIMITING ZONES
    # Mencegah satu siswa/IP membanjiri server
    # ==============================================================

    # Zone untuk login: maks 5 request/menit per IP (anti brute-force)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # Zone untuk API: maks 60 request/menit per IP (1 req/detik)
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=60r/m;

    # Zone untuk static assets: maks 200 request/menit per IP
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=200r/m;

    # Batasi koneksi simultan per IP (anti DoS dari satu komputer)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # --- LOGGING ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    # Log request lambat (> 3 detik) untuk debugging
    log_format slow '$remote_addr [$time_local] "$request" '
                    '$status $request_time "$http_user_agent"';

    access_log /var/log/nginx/cbt_access.log main;
    error_log  /var/log/nginx/cbt_error.log warn;

    # ==============================================================
    # SERVER BLOCK — HTTP (Port 80)
    # ==============================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        # Root frontend (Vite build output)
        root /opt/cbt-enterprise/frontend/dist;
        index index.html;

        # Batasi koneksi simultan per IP: maks 50 koneksi
        limit_conn conn_limit 50;

        # ============================================================
        # 1. STATIC ASSETS — Cache agresif (hash-based filenames)
        #    Vite otomatis memberi nama file dengan hash (index-Abc123.js)
        #    Aman untuk cache sangat panjang
        # ============================================================
        location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            try_files $uri =404;

            # Rate limit assets (mencegah download storm saat 5000 login bersamaan)
            limit_req zone=static_limit burst=50 nodelay;
        }

        # ============================================================
        # 2. FRONTEND SPA — index.html selalu fresh
        # ============================================================
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # ============================================================
        # 3. LOGIN ENDPOINT — Rate Limit Ketat (anti brute-force)
        # ============================================================
        location ~ ^/(rest|auth)/v1/(token|signup|otp) {
            limit_req zone=login_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Tambahkan header informasi rate limit ke response
            add_header X-RateLimit-Limit "5" always;
        }

        # ============================================================
        # 4. SUPABASE API PROXY — Dengan Rate Limit
        # ============================================================
        location ~ ^/(rest|auth|storage)/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;

            proxy_connect_timeout 30s;
            proxy_read_timeout    120s;
        }

        # ============================================================
        # 5. REALTIME WEBSOCKET PROXY
        #    WAJIB: upgrade ke WebSocket untuk monitoring real-time
        # ============================================================
        location ~ ^/realtime/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;

            # Header upgrade WebSocket (KRITIS)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Durasi ujian max = 180 menit = 10800 detik
            proxy_read_timeout    10800s;
            proxy_send_timeout    10800s;

            # Matikan buffering untuk real-time data
            proxy_buffering off;
        }

        # ============================================================
        # 6. SECURITY HEADERS (Semua Response)
        # ============================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Blokir akses ke fitur berbahaya saat ujian (kamera, mikrofon, dll)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # ============================================================
        # 7. CUSTOM ERROR PAGES (Rate Limit)
        # ============================================================
        error_page 429 /rate_limit.html;
        location = /rate_limit.html {
            root /opt/cbt-enterprise/frontend/dist;
            internal;
            default_type text/html;
            return 429 '<!DOCTYPE html><html><body style="font-family:sans-serif;text-align:center;padding:50px"><h2>Terlalu Banyak Permintaan</h2><p>Sistem sedang sibuk. Silakan tunggu sebentar dan coba lagi.</p></body></html>';
        }

        # ============================================================
        # 8. HEALTH CHECK ENDPOINT (untuk monitoring VHD)
        # ============================================================
        location /health {
            access_log off;
            return 200 "CBT-VHD-OK\n";
            add_header Content-Type text/plain;
        }

        # ============================================================
        # 9. BLOKIR AKSES FILE SENSITIF
        # ============================================================
        location ~* \.(env|git|sql|log|bak|sh|conf)$ {
            deny all;
            return 404;
        }

        error_log  /var/log/nginx/cbt_error.log warn;
        access_log /var/log/nginx/cbt_access.log main;
    }

    # ==============================================================
    # SERVER BLOCK — HTTPS (Port 443) — AKTIFKAN SETELAH BUAT CERT
    # ==============================================================
    # Cara generate self-signed cert di VHD Debian:
    #   sudo mkdir -p /etc/nginx/ssl
    #   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
    #     -keyout /etc/nginx/ssl/cbt.key \
    #     -out /etc/nginx/ssl/cbt.crt \
    #     -subj "/CN=cbt.local/O=CBTSchool/C=ID"
    #   sudo nginx -t && sudo systemctl reload nginx
    # ==============================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name _;

        # --- SSL CERTIFICATE ---
        ssl_certificate     /etc/nginx/ssl/cbt.crt;
        ssl_certificate_key /etc/nginx/ssl/cbt.key;

        # --- SSL SETTINGS (Modern, Secure) ---
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS: paksa HTTPS untuk 1 tahun ke depan
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Root frontend
        root /opt/cbt-enterprise/frontend/dist;
        index index.html;

        limit_conn conn_limit 50;

        location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            limit_req zone=static_limit burst=50 nodelay;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location ~ ^/(rest|auth)/v1/(token|signup|otp) {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location ~ ^/(rest|auth|storage)/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
            proxy_read_timeout 120s;
        }

        location ~ ^/realtime/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout  10800s;
            proxy_send_timeout  10800s;
            proxy_buffering off;
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location /health {
            access_log off;
            return 200 "CBT-VHD-HTTPS-OK\n";
            add_header Content-Type text/plain;
        }

        location ~* \.(env|git|sql|log|bak|sh|conf)$ {
            deny all;
            return 404;
        }
    }
}
